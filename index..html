    <title>国内主流AI平台套餐 Coding Plan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.4;
            padding: 48px 96px;
            font-size: 14px;
        }

        .container {
            max-width: 1920px;
            margin: 0 auto;
        }

        .section-divider {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
            margin: 24px 0;
        }

        .header {
            margin-bottom: 48px;
            text-align: center;
            position: relative;
            padding: 48px 0;
        }

        .github-link {
            position: absolute;
            top: 0;
            right: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .github-link:hover {
            color: var(--text-primary);
            border-color: var(--accent-primary);
            transform: translateY(-1px);
        }

        .header h1 {
            font-size: 42px;
            color: var(--text-primary);
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .update-date {
            font-size: 14px;
            color: var(--text-tertiary);
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 500;
            line-height: 1.7;
        }

        .header .models {
            color: var(--text-tertiary);
            font-size: 15px;
            font-weight: 400;
            line-height: 1.7;
        }

        /* 顶部筛选栏 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .filter-dropdown {
            position: relative;
        }

        .filter-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-lg);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
            min-height: 40px;
        }

        .filter-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .filter-btn .arrow {
            width: 14px;
            height: 14px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.5;
        }

        .filter-btn:hover .arrow {
            opacity: 0.7;
        }

        .filter-btn.active .arrow {
            transform: rotate(180deg);
            opacity: 1;
        }

        .filter-btn .arrow svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .filter-btn .count {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3);
        }

        /* 下拉菜单 */
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            min-width: 280px;
            max-width: 360px;
            box-shadow: var(--shadow-xl);
            z-index: 1000;
            display: none;
            animation: dropdownFade 0.2s ease-out;
        }

        @keyframes dropdownFade {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-section {
            margin-bottom: 16px;
        }

        .dropdown-section:last-child {
            margin-bottom: 0;
        }

        .dropdown-title {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 240px;
            overflow-y: auto;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-label:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
        }

        .radio-label input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent-primary);
        }

        .radio-label span {
            font-size: 13px;
            color: var(--text-primary);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            transition: all 0.15s ease;
        }

        .checkbox-item:hover {
            background: var(--bg-tertiary);
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            background: white;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-color: transparent;
        }

        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: translate(-50%, -60%) rotate(45deg);
        }

        .checkbox-item label {
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            flex: 1;
            font-weight: 500;
        }

        .price-inputs {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .price-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 13px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .price-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .price-separator {
            color: var(--text-tertiary);
            font-size: 13px;
            font-weight: 500;
        }

        /* 双滑块样式 */
        .price-slider-container {
            padding: 8px 0;
        }

        .price-slider {
            position: relative;
            height: 24px;
            margin: 10px 0;
        }

        .slider-track {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            background: #e2e8f0;
            border-radius: 4px;
            transform: translateY(-50%);
        }

        .slider-range {
            position: absolute;
            top: 50%;
            height: 6px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 4px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 18px;
            height: 18px;
            background: white;
            border: 2px solid #6366f1;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .slider-thumb:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .slider-thumb:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .slider-values {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }

        .slider-value {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .dropdown-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .dropdown-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .dropdown-btn.primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .dropdown-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .dropdown-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .dropdown-btn.secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        /* 重置按钮 */
        .reset-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-lg);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .reset-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
            transform: translateY(-1px);
        }

        /* 统计信息 */
        .stats-bar {
            color: var(--text-tertiary);
            font-size: 12px;
            display: flex;
            align-items: center;
            margin-left: auto;
        }

        .stats-bar strong {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 模块卡片容器 */
        .vendor-modules-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 厂家模块卡片 */
        .vendor-module {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .vendor-module-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #fafbfc, #f8fafc);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .vendor-logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .vendor-info {
            flex: 1;
        }

        .vendor-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .vendor-protocol {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .vendor-doc-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            color: #475569;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .vendor-doc-btn::before {
            content: '📄';
            font-size: 14px;
        }

        .vendor-doc-btn:hover {
            background: #f8fafc;
            border-color: #6366f1;
            color: #6366f1;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .vendor-module-body {
            padding: 20px 24px;
        }

        /* 模型标签区域 */
        .vendor-models {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .vendor-model-tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .vendor-model-tag:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .vendor-model-tag.highlight {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            font-weight: 500;
        }

        /* Plan 小方块网格 */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .plan-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .plan-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }

        .plan-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .plan-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .plan-price-tag {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .plan-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .plan-price-unit {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 套餐模型标签 */
        .plan-models {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .plan-model-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 11px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .plan-model-tag:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .plan-model-tag.highlight {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            font-weight: 500;
        }

        .plan-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .plan-detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .plan-detail-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-size: 12px;
        }

        .plan-benefits {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        .plan-benefit-tag {
            padding: 4px 8px;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.08), rgba(251, 146, 60, 0.08));
            color: #f97316;
            border: 1px solid rgba(249, 115, 22, 0.15);
            border-radius: var(--radius-sm);
            font-size: 11px;
        }

        .plan-action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 16px;
            margin-top: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .plan-note {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 8px;
            line-height: 1.4;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-tertiary);
            font-size: 14px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .plans-grid {
                grid-template-columns: 1fr;
            }

            .vendor-module-header {
                flex-wrap: wrap;
            }
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 1200px;
        }

        thead {
            background: linear-gradient(135deg, #fafbfc, #f8fafc);
        }

        th {
            padding: 16px 18px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            border-bottom: 2px solid var(--border-light);
            position: relative;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        th.sortable::after {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            margin-left: 8px;
            vertical-align: middle;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 4px solid var(--text-tertiary);
            opacity: 0.4;
            transition: all 0.2s;
        }

        th.sort-asc::after {
            border-top: none;
            border-bottom: 4px solid var(--accent-primary);
            opacity: 1;
        }

        th.sort-desc::after {
            border-top: 4px solid var(--accent-primary);
            border-bottom: none;
            opacity: 1;
        }

        /* 冻结列样式 */
        th.sticky-first,
        th.sticky-second {
            position: sticky;
            z-index: 20;
            background: linear-gradient(135deg, #fafbfc, #f8fafc);
        }

        th.sticky-first {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        th.sticky-second {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
            white-space: nowrap;
            color: var(--text-primary);
            position: relative;
            transition: background 0.15s ease;
        }

        tbody tr {
            transition: all 0.15s ease;
        }

        tbody tr:hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.02), rgba(139, 92, 246, 0.02));
        }

        tbody tr:hover td {
            color: var(--text-primary);
        }

        /* 冻结列的 td */
        td.sticky-first,
        td.sticky-second {
            position: sticky;
            z-index: 100;
            background: var(--bg-secondary);
            transform: translateZ(0);
            will-change: transform;
        }

        td.sticky-first {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        td.sticky-second {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        tbody tr:hover td.sticky-first,
        tbody tr:hover td.sticky-second {
            background: var(--bg-secondary);
            box-shadow: inset 0 0 0 100px rgba(99, 102, 241, 0.02);
        }

        /* 平台名称 */
        .vendor-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        /* 套餐名称 */
        .plan-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        /* 价格 */
        .price {
            color: #00a855;
            font-weight: 500;
            font-size: 13px;
        }

        .price-monthly {
            color: var(--accent-primary);
            font-weight: 500;
            font-size: 13px;
        }

        .price-normal {
            color: var(--text-primary);
            font-weight: 400;
            font-size: 13px;
        }

        /* 原始价格（划线） */
        .price-original {
            text-decoration: line-through;
            font-size: 12px;
            color: var(--text-tertiary);
            opacity: 0.7;
            margin-left: 4px;
            font-weight: 400;
        }

        /* 跳转按钮 */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0099cc;
            border: 1px solid #0099cc;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: #0088b8;
            border-color: #0088b8;
            color: white;
            transform: translateY(-1px);
        }

        .action-btn::after {
            content: '→';
            font-size: 14px;
            transition: transform 0.2s;
        }

        .action-btn:hover::after {
            transform: translateX(3px);
        }

        /* 模型标签 */
        .model-tag {
            display: inline-block;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
            font-weight: 400;
            border: 1px solid var(--border-color);
        }

        /* 请求数 */
        .request-count {
            color: var(--text-primary);
            font-weight: 400;
            font-size: 13px;
        }

        /* 单位文本 */
        .unit {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 11px;
            margin-left: 4px;
            margin-right: 2px;
        }

        /* 其他权益 */
        .benefit {
            display: inline-block;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.08), rgba(251, 146, 60, 0.08));
            color: #f97316;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
            font-weight: 400;
            border: 1px solid rgba(249, 115, 22, 0.15);
        }

        /* 备注 */
        .note {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state-hint {
            font-size: 13px;
            color: var(--text-tertiary);
        }

                    if (!hasModel) return false;
                }

                // 首月价格筛选
                if (isPriceFilterApplied('firstMonth')) {
                    if (priceFilters.firstMonth.min > 0 && plan.firstMonthPrice < priceFilters.firstMonth.min) {
                        return false;

                    if (priceFilters.firstMonth.max < priceSliders.firstMonth.maxValue && plan.firstMonthPrice > priceFilters.firstMonth.max) {
                        return false;
                    }
                }

                // 包月价格筛选
                if (isPriceFilterApplied('monthly')) {
                    if (priceFilters.monthly.min > 0 && plan.monthlyPrice < priceFilters.monthly.min) {
                        return false;

                    if (priceFilters.monthly.max < priceSliders.monthly.maxValue && plan.monthlyPrice > priceFilters.monthly.max) {

                }

                // 包季价格筛选
                if (isPriceFilterApplied('quarterly')) {
                    if (priceFilters.quarterly.min > 0 && plan.quarterlyPrice < priceFilters.quarterly.min) {
                        return false;

                // 包年价格筛选
                if (isPriceFilterApplied('yearly')) {
                    if (priceFilters.yearly.min > 0 && plan.yearlyPrice < priceFilters.yearly.min) {
                        return false;
                    }
                    if (priceFilters.yearly.max < priceSliders.yearly.maxValue && plan.yearlyPrice > priceFilters.yearly.max) {
                        return false;
                    }
                }

                return true;
            });

            showingCount.textContent = filteredPlans.length;

        // 价格滑块状态
        const priceSliders = {
            firstMonth: { min: 0, max: 0, minValue: 1, maxValue: 0 },
            monthly: { min: 0, max: 0, minValue: 1, maxValue: 0 },

        // 计算价格类型的最大值
        function getMaxPrice(priceType) {
            if (allPlans.length === 0) return 1000;
            const priceKey = priceType + 'Price';
            const prices = allPlans.map(plan => plan[priceKey]).filter(p => typeof p === 'number' && p > 0);
            if (prices.length === 0) return 1000;
            const maxPrice = Math.max(...prices);
            return Math.ceil(maxPrice); // 向上取整
        }

        // 计算价格类型的最小值
        function getMinPrice(priceType) {
            if (allPlans.length === 0) return 1;
            const priceKey = priceType + 'Price';
            const prices = allPlans.map(plan => plan[priceKey]).filter(p => typeof p === 'number' && p > 0);
            if (prices.length === 0) return 1;
            return Math.floor(Math.min(...prices)); // 向下取整
        }

        // 初始化价格滑块
        function initPriceSlider(priceType) {
            const slider = {
                minThumb: document.getElementById(`${priceType}SliderMin`),
                maxThumb: document.getElementById(`${priceType}SliderMax`),
                range: document.getElementById(`${priceType}SliderRange`),
                minValue: document.getElementById(`${priceType}MinValue`),
                maxValue: document.getElementById(`${priceType}MaxValue`)
            };

            const minPrice = getMinPrice(priceType);
            const maxPrice = getMaxPrice(priceType);
            priceSliders[priceType].minValue = minPrice;
            priceSliders[priceType].maxValue = maxPrice;
            priceSliders[priceType].min = minPrice;
            priceSliders[priceType].max = maxPrice;

            updateSliderVisuals(priceType, minPrice, maxPrice);

            // 添加拖动事件
            addSliderDragEvents(priceType, slider);
        }

        // 更新滑块视觉效果（对数刻度）
        function updateSliderVisuals(priceType, minPrice, maxPrice) {
            const slider = priceSliders[priceType];
            const minValue = Math.max(slider.minValue, Math.round(minPrice));
            const maxValue = Math.min(slider.maxValue, Math.round(maxPrice));
            const minLog = Math.log10(slider.minValue);
            const maxLog = Math.log10(slider.maxValue);

            // 对数刻度计算位置
            const minPercent = ((Math.log10(minValue) - minLog) / (maxLog - minLog)) * 100;
            const maxPercent = ((Math.log10(maxValue) - minLog) / (maxLog - minLog)) * 100;

            const minThumb = document.getElementById(`${priceType}SliderMin`);
            const maxThumb = document.getElementById(`${priceType}SliderMax`);
            const range = document.getElementById(`${priceType}SliderRange`);
            const minValueEl = document.getElementById(`${priceType}MinValue`);
            const maxValueEl = document.getElementById(`${priceType}MaxValue`);

            if (minThumb) minThumb.style.left = `${minPercent}%`;
            if (maxThumb) maxThumb.style.left = `${maxPercent}%`;
            if (range) {
                range.style.left = `${minPercent}%`;
                range.style.width = `${maxPercent - minPercent}%`;
            }
            if (minValueEl) minValueEl.textContent = `¥${minValue}`;
            if (maxValueEl) maxValueEl.textContent = `¥${maxValue}`;

            slider.min = minValue;
            slider.max = maxValue;
        }

        // 添加滑块拖动事件
        function addSliderDragEvents(priceType, slider) {
            const { minThumb, maxThumb } = slider;
            let isDragging = null;

            const handleDrag = (e) => {
                if (isDragging === null) return;

                const rect = slider.minThumb.parentElement.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                let percent = (x / rect.width) * 100;
                percent = Math.max(0, Math.min(100, percent));

                // 从对数刻度转换回实际值
                const minLog = Math.log10(priceSliders[priceType].minValue);
                const maxLog = Math.log10(priceSliders[priceType].maxValue);
                const value = Math.pow(10, minLog + (percent / 100) * (maxLog - minLog));

                if (isDragging === 'min') {
                    const newMin = Math.min(value, priceSliders[priceType].max);
                    updateSliderVisuals(priceType, newMin, priceSliders[priceType].max);
                } else if (isDragging === 'max') {
                    const newMax = Math.max(value, priceSliders[priceType].min);
                    updateSliderVisuals(priceType, priceSliders[priceType].min, newMax);
                }
            };

            const startDrag = (type) => (e) => {
                e.preventDefault();
                isDragging = type;
                document.addEventListener('mousemove', handleDrag);
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchmove', handleDrag);
                document.addEventListener('touchend', stopDrag);
            };

            const stopDrag = () => {
                isDragging = null;
                document.removeEventListener('mousemove', handleDrag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchmove', handleDrag);
                document.removeEventListener('touchend', stopDrag);
            };

            minThumb.addEventListener('mousedown', startDrag('min'));
            minThumb.addEventListener('touchstart', startDrag('min'));
            maxThumb.addEventListener('mousedown', startDrag('max'));
            maxThumb.addEventListener('touchstart', startDrag('max'));
        }

        // 排序数据
        function sortData(column, direction = 'asc') {
            currentSort = { column, direction };

            filteredPlans.sort((a, b) => {
                let valueA, valueB;

                switch (column) {
                    case 'vendor':
                        valueA = a['vendor'];
                        valueB = b['vendor'];
                        break;
                    case 'plan':
                        valueA = a['plan'];
                        valueB = b['plan'];
                        break;
                    case 'action':
                        valueA = a['plan'];
                        valueB = b['plan'];
                        break;
                    case 'firstMonthPrice':
                        valueA = a.firstMonthPrice;
                        valueB = b.firstMonthPrice;
                        break;
                    case 'monthlyPrice':
                        valueA = a.monthlyPrice;
                        valueB = b.monthlyPrice;
                        break;
                    case 'quarterlyPrice':
                        valueA = a.quarterlyPrice;
                        valueB = b.quarterlyPrice;
                        break;
                    case 'yearlyPrice':
                        valueA = a.yearlyPrice;
                        valueB = b.yearlyPrice;
                        break;
                    case 'models':
                        valueA = a['支持模型'];
                        valueB = b['支持模型'];
                        break;
                    case 'hourlyRequests':
                        valueA = typeof a.hourlyRequests === 'string' ? 0 : a.hourlyRequests;
                        valueB = typeof b.hourlyRequests === 'string' ? 0 : b.hourlyRequests;
                        break;
                    case 'monthlyRequests':
                        valueA = typeof a.monthlyRequests === 'string' ? 0 : a.monthlyRequests;
                        valueB = typeof b.monthlyRequests === 'string' ? 0 : b.monthlyRequests;
                        break;
                    case 'benefits':
                        valueA = a['其他权益'];
                        valueB = b['其他权益'];
                        break;
                    case 'note':
                        valueA = a['note'];
                        valueB = b['note'];
                        break;
                    default:
                        return 0;
                }

                if (typeof valueA === 'number') {
                    return direction === 'asc' ? valueA - valueB : valueB - valueA;
                } else {
                    return direction === 'asc'
                        ? valueA.localeCompare(valueB, 'zh-CN')
                        : valueB.localeCompare(valueA, 'zh-CN');
                }
            });

            renderTable();
            updateSortHeaders();
        }

                        allModels: new Set()

        // 价格格式化函数：整数不显示小数，小数显示两位
        function formatPrice(price) {
            if (price === '-' || price === null || price === undefined) {
                return '-';
            }
            if (Number.isInteger(price)) {
                return price.toString();
            } else {
                return price.toFixed(2);
            }
        }

        // 表头排序点击
        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const column = th.dataset.column;
                let direction = 'asc';

                if (currentSort.column === column) {
                    // 点击同一列，在升序、降序、取消之间循环
                    if (currentSort.direction === 'asc') {
                        direction = 'desc'; // 升序 -> 降序
                    } else if (currentSort.direction === 'desc') {
                        // 降序 -> 取消，恢复原始顺序
                        currentSort = { column: null, direction: 'asc' };
                        document.querySelectorAll('th').forEach(th => {
                            th.classList.remove('sort-asc', 'sort-desc');
                        });
                        // 按照原始索引恢复顺序
                        filteredPlans.sort((a, b) => a.originalIndex - b.originalIndex);
                        renderTable();
                        return; // 提前返回，不调用 sortData
                    }
                }

                sortData(column, direction);
            });
        });

        // 表头排序功能已移除（新布局不需要）

        // 加载数据
        function loadData() {
            allPlans = plansData.map((item, index) => ({
                ...item,
                originalIndex: index
            }));

            filteredPlans = [...allPlans];

            initFilters();
            initPriceSliders();
            applyFilters();

            updateShowingCount();
            console.log(`成功加载 ${allPlans.length} 条套餐数据`);
        }

        // 加载配置（直接使用嵌入的配置）
        function loadConfig() {
            applyConfig();
            console.log('成功加载配置文件');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            loadConfig();
            loadData();
        });

        // 应用配置
        function applyConfig() {
            if (appConfig.header) {
                const h = appConfig.header;
                document.title = `${h.title} - Coding Plan 对比工具`;
                document.getElementById('pageTitle').textContent = h.title;
                document.getElementById('updateDate').textContent = h.updateDate;
                document.getElementById('subtitle').textContent = h.subtitle;
                document.getElementById('models').textContent = h.models;

                if (h.github) {
                    const githubLink = document.getElementById('githubLink');
                    githubLink.href = h.github.url;
                    document.getElementById('githubText').textContent = h.github.text;
                }
            }

            // 渲染评分标准
            if (appConfig.ratingGuide) {
                document.getElementById('ratingGuide').textContent = appConfig.ratingGuide;
            }

            // 渲染底部说明
            if (appConfig.notes && appConfig.notes.length > 0) {
                const notesSection = document.getElementById('notesSection');
                notesSection.innerHTML = `
                    <h3>💡 说明</h3>
                    <ul>
                        ${appConfig.notes.map(note => `<li>${note}</li>`).join('')}
                    </ul>
                `;
            }

            // 渲染账号出售区域
            if (appConfig.accountSale) {
                renderAccountSale(appConfig.accountSale);
            }
        }

        // 渲染账号出售
        function renderAccountSale(sale) {
            const container = document.getElementById('accountSaleSection');
            if (!container || !sale.accounts || sale.accounts.length === 0) return;

            const accountsHtml = sale.accounts.map(acc => `
                <div class="account-card">
                    <div class="platform">${acc.platform}</div>
                    <div class="detail">${acc.detail}</div>
                    <span class="price-tag">${acc.price}</span>
                </div>
            `).join('');

            const contactHtml = sale.qrcode ? `
                <div class="contact-section">
                    <div class="contact-info">
                        <div class="label">感兴趣联系 ${sale.contact.label}</div>
                        <div class="wechat-id">${sale.contact.id}</div>
                    </div>
                    <img src="${sale.qrcode}" alt="微信二维码" class="contact-qrcode">
                </div>
            ` : `
                <div class="contact-section">
                    <div class="contact-info">
                        <div class="label">感兴趣联系 ${sale.contact.label}</div>
                        <div class="wechat-id">${sale.contact.id}</div>
                    </div>
                </div>
            `;

            container.innerHTML = `
                <h3>${sale.title}</h3>
                <div class="description">${sale.description}</div>
                <div class="account-cards">${accountsHtml}</div>
                ${contactHtml}
            `;
        }

        // 处理价格数据：补全缺失值
        function processPrices(item, index) {
            // 转换价格为数字
            let firstMonthPrice = parseFloat(item.firstMonthPrice);
            let monthlyPrice = parseFloat(item.monthlyPrice);
            let quarterlyPrice = parseFloat(item.quarterlyPrice);
            let yearlyPrice = parseFloat(item.yearlyPrice);

            // 如果首月价格为 "-" 或 NaN，使用包月价格
            if (isNaN(firstMonthPrice) || item.firstMonthPrice === '-') {
                firstMonthPrice = monthlyPrice;
            }

            // 如果包季价格为 "-" 或 NaN，使用包月价格 * 3
            if (isNaN(quarterlyPrice) || item.quarterlyPrice === '-') {
                quarterlyPrice = monthlyPrice * 3;
            }

            // 如果包年价格为 "-" 或 NaN，使用包季价格 * 3
            if (isNaN(yearlyPrice) || item.yearlyPrice === '-') {
                yearlyPrice = quarterlyPrice * 3;
            }

            // 转换请求数为数字
            item.hourlyRequests = typeof item.hourlyRequests === 'string' && item.hourlyRequests === '未公开'
                ? '未公开'
                : parseInt(item.hourlyRequests) || 0;

            item.monthlyRequests = typeof item.monthlyRequests === 'string' && item.monthlyRequests === '未公开'
                ? '未公开'
                : parseInt(item.monthlyRequests) || 0;

            return {
                ...item,
                firstMonthPrice,
                monthlyPrice,
                quarterlyPrice,
                yearlyPrice,
                originalIndex: index // 保存原始索引，用于恢复顺序
            };
        }

        // 加载套餐数据（已废弃，使用嵌入数据）
    </script>
</body>
</html>
